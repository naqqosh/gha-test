name: Parallel jobs

on:
  push:
    branches: [workflow-planner]

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      job_output: ${{ steps.get_date.outputs.today }}
    steps:
      - id: get_date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - run: echo ${{ needs.job1.outputs.job_output }}
