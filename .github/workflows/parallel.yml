name: Parallel jobs

on:
  push:
    branches: [workflow-planner]

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - run: echo "importatn data" > report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: my-report
          path: report.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: my-report

      - run: cat report.txt
