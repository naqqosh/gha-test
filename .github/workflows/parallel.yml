name: Parallel jobs

on:
  push:
    branches: [workflow-planner]

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - run: echo "I'm job1"

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - name: shartli ishla
        if: github.ref_name == "main"
        run: echo "demak siz main'ga push qildiz, bu job1 dan keyin ishladi"
