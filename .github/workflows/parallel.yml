name: Cache Demo

on: [push]

jobs:
  in-runner:
    runs-on: ubuntu-lateset

    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: node -v

  in-container:
    runs-on: ubuntu-latest

    container: node:22-alpine

    steps:
      - run: node -v
