name: "Sevices: Postgres"

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          options: >-
            --health-cmd="pg_isready"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5

    steps:
      - run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - run: psql -h postgres -U postgres -c "SELECT 1"
        env:
          PGPASSWORD: postgres
